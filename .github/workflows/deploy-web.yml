# ──────────────────────────────────────────────────
# OmraVIP Quotes — Déploiement frontend sur GitHub Pages
# Version démo de l'interface (sans backend Tauri)
# Déclenché manuellement ou sur push vers main
# ──────────────────────────────────────────────────
name: Deploy Web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:      # ← déclenchement manuel depuis l'onglet Actions

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm            # ← npm ci utilise le cache automatiquement

      - name: Install dependencies
        run: npm ci --legacy-peer-deps  # vite@8 peer-deps avec @vitejs/plugin-vue@5

      - name: Build Vite (production)
        run: npx vue-tsc --noEmit && npm run build

      # ── Uploading le output dist/ vers GitHub Pages ──
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
